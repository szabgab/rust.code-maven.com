version: 2
updates:
  - package-ecosystem: cargo
    directories:
      - "/"
      - "/examples/*"
      - "/examples/*/*"
      - "/examples/*/*/*"
    schedule:
      interval: weekly
    groups:
      rust:
        patterns:
          - "*"
  - package-ecosystem: cargo
    directories:
      - "/books/error-handling/src/examples/*"
      - "/books/error-handling/src/examples/errors/*"
    schedule:
      interval: weekly
    groups:
      books-error-handling:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
